<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background: rounded square #1D9E75 -->
  <rect width="32" height="32" rx="7" fill="#1D9E75"/>
  <!-- Chữ T — bold, căn giữa trên -->
  <text
    x="16" y="15"
    text-anchor="middle"
    dominant-baseline="central"
    font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
    font-weight="800"
    font-size="16"
    fill="white"
  >T</text>
  <!-- Checkmark — nhỏ, góc dưới phải, rõ ở 16px -->
  <polyline
    points="8,23 12,27 24,18"
    stroke="white"
    stroke-width="2.8"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
    opacity="0.92"
  />
</svg>